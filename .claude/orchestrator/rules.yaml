# 智能调度规则集 (Layer 1)
# 用户提问时，PreToolUse 钩子加载此文件判断是否需要派子代理
# 命中 should_dispatch → 派 Agent
# 命中 dont_dispatch → 不派，主会话自己答
# 都不命中 → 灰区，交给 Layer 2 LLM 评分

version: "1.0"

# ==================== 不派子代理（强信号） ====================
dont_dispatch:
  # 强关键词：用户明确表示"不要并行"或"小任务"
  keywords:
    - "快速"
    - "简单"
    - "小"
    - "只改"
    - "一个一个"
    - "先 X 再 Y"  # 强顺序依赖
    - "帮我看下"     # 询问/解释类
    - "解释"
    - "是什么"
    - "为什么"
    - "怎么用"
    - "如何"
    - "对比"
    - "区别"
    - "推荐"
    - "建议"

  # 任务规模估算
  file_estimate_max: 2         # 涉及 ≤2 个文件
  module_estimate_max: 1       # 单模块
  line_estimate_max: 50        # 修改 ≤50 行

  # 任务类型
  task_types:
    - explanation    # 解释概念
    - question       # 询问
    - single_edit    # 改一处

# ==================== 派子代理（强信号） ====================
should_dispatch:
  # 强关键词：用户明确表示"要全面/并行/多模块"
  keywords:
    - "全面"
    - "彻底"
    - "完整"
    - "并行"
    - "同时"
    - "一起"
    - "多模块"
    - "跨模块"
    - "全栈"
    - "前后端一起"
    - "排查 BUG"     # BUG 排查通常跨文件
    - "修复点"        # 修复多个点
    - "全部分析"

  # 任务规模估算
  file_estimate_min: 5         # 涉及 ≥5 个文件
  module_estimate_min: 2       # 多模块
  line_estimate_min: 200       # 修改 ≥200 行

  # 任务类型
  task_types:
    - bug_fix         # 修 BUG（通常需要多角度排查）
    - refactor        # 重构
    - feature_full    # 完整功能（前后端+数据库）
    - multi_module    # 多模块改动
    - migration       # 数据迁移

  # 并行 Agent 数量上限（你的设定：最多 2-3 个）
  max_agents: 3

# ==================== 灰区（交给 Layer 2 LLM 评分） ====================
# 不命中以上任何规则的任务
# 让小模型评估"可拆性"和"工作量"
gray_zone:
  # 灰区关键词
  keywords:
    - "排查"
    - "分析"
    - "修一下"
    - "看看"
    - "优化"
    - "整理"

  # LLM 评分阈值
  llm_score_threshold: 6        # ≥6 分才派
  llm_dimensions:
    - decomposability  # 可拆性 0-10
    - workload         # 工作量 0-10
    - risk             # 风险度 0-10
